<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Page</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .float-anim { animation: float 5s ease-in-out infinite; }
    .fade-up { animation: fadeUp 0.7s ease-out forwards; opacity: 0; }
    .fade-up-1 { animation-delay: 0.1s; }
    .fade-up-2 { animation-delay: 0.25s; }
    .fade-up-3 { animation-delay: 0.4s; }
    .fade-up-4 { animation-delay: 0.55s; }
    .fade-up-5 { animation-delay: 0.7s; }
    .shimmer-btn {
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }
    .download-ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid;
      opacity: 0.08;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto relative" style="background-color: #0f1729; font-family: 'DM Sans', sans-serif;"><!-- Decorative rings -->
   <div class="download-ring" style="width: 500px; height: 500px; top: -120px; right: -100px; border-color: #6ee7b7;"></div>
   <div class="download-ring" style="width: 340px; height: 340px; bottom: -60px; left: -80px; border-color: #6ee7b7;"></div>
   <div class="download-ring" style="width: 200px; height: 200px; top: 40%; left: 60%; border-color: #6ee7b7;"></div>
   <div class="relative z-10 flex flex-col items-center justify-center min-h-full px-6 py-16"><!-- Icon -->
    <div class="fade-up fade-up-1 float-anim mb-8">
     <div id="icon-box" class="w-24 h-24 rounded-3xl flex items-center justify-center shadow-2xl" style="background: linear-gradient(135deg, #10b981, #059669);"><i data-lucide="arrow-down-to-line" style="width:44px; height:44px; color: #ffffff; stroke-width: 2;"></i>
     </div>
    </div><!-- Title -->
    <h1 id="el-title" class="fade-up fade-up-2 text-center font-bold tracking-tight leading-tight" style="font-family: 'Playfair Display', serif; font-size: 48px; color: #f0fdf4;">Lumina</h1><!-- Tagline -->
    <p id="el-tagline" class="fade-up fade-up-2 mt-3 text-center max-w-md" style="font-size: 18px; color: #94a3b8;">Beautiful, lightning-fast file management for creative professionals.</p><!-- Version badge -->
    <div class="fade-up fade-up-3 mt-5"><span id="el-version" class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-xs font-medium tracking-wide" style="background-color: rgba(16,185,129,0.12); color: #6ee7b7;"> v2.4.1 — Latest Stable </span>
    </div><!-- Download button -->
    <div class="fade-up fade-up-4 mt-10"><button id="el-download-btn" onclick="handleDownload()" class="group relative inline-flex items-center gap-3 px-10 py-4 rounded-2xl font-bold text-lg transition-all duration-300 hover:scale-105 hover:shadow-xl active:scale-95 shimmer-btn" style="background: linear-gradient(90deg, #10b981, #059669, #10b981); color: #ffffff; box-shadow: 0 0 40px rgba(16,185,129,0.25);"> <i data-lucide="download" style="width:22px; height:22px;"></i> <span id="btn-text">Download Now</span> </button>
     <p id="el-file-info" class="text-center mt-3" style="font-size: 13px; color: #64748b;">macOS · Windows · Linux &nbsp;·&nbsp; 48 MB</p>
    </div><!-- Features -->
    <div class="fade-up fade-up-5 mt-14 grid grid-cols-1 sm:grid-cols-3 gap-5 max-w-2xl w-full">
     <div id="feat-1" class="flex flex-col items-center text-center p-5 rounded-2xl transition-colors duration-300" style="background-color: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-3" style="background-color: rgba(16,185,129,0.12);"><i data-lucide="zap" style="width:20px; height:20px; color: #6ee7b7;"></i>
      </div><span id="feat-1-text" class="font-medium" style="font-size: 14px; color: #e2e8f0;">Blazing fast transfers</span>
     </div>
     <div id="feat-2" class="flex flex-col items-center text-center p-5 rounded-2xl transition-colors duration-300" style="background-color: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-3" style="background-color: rgba(16,185,129,0.12);"><i data-lucide="shield-check" style="width:20px; height:20px; color: #6ee7b7;"></i>
      </div><span id="feat-2-text" class="font-medium" style="font-size: 14px; color: #e2e8f0;">End-to-end encrypted</span>
     </div>
     <div id="feat-3" class="flex flex-col items-center text-center p-5 rounded-2xl transition-colors duration-300" style="background-color: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-3" style="background-color: rgba(16,185,129,0.12);"><i data-lucide="cloud" style="width:20px; height:20px; color: #6ee7b7;"></i>
      </div><span id="feat-3-text" class="font-medium" style="font-size: 14px; color: #e2e8f0;">Seamless cloud sync</span>
     </div>
    </div>
   </div>
  </div>
  <script>
    // Download button interaction
    function handleDownload() {
      const btn = document.getElementById('el-download-btn');
      const btnText = document.getElementById('btn-text');
      const originalText = btnText.textContent;
      btn.disabled = true;
      btn.style.opacity = '0.7';
      btnText.textContent = 'Preparing…';

      setTimeout(() => {
        btnText.textContent = 'Ready!';
        btn.style.opacity = '1';
        setTimeout(() => {
          btnText.textContent = originalText;
          btn.disabled = false;
        }, 1500);
      }, 1500);
    }

    // Element SDK
    const defaultConfig = {
      background_color: '#0f1729',
      surface_color: 'rgba(255,255,255,0.04)',
      text_color: '#e2e8f0',
      primary_action: '#10b981',
      secondary_action: '#94a3b8',
      font_family: 'DM Sans',
      font_size: 16,
      app_title: 'Lumina',
      tagline: 'Beautiful, lightning-fast file management for creative professionals.',
      version_text: 'v2.4.1 — Latest Stable',
      button_text: 'Download Now',
      feature_1: 'Blazing fast transfers',
      feature_2: 'End-to-end encrypted',
      feature_3: 'Seamless cloud sync'
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      const wrapper = document.getElementById('app-wrapper');
      wrapper.style.backgroundColor = c.background_color;
      wrapper.style.fontFamily = `${c.font_family}, DM Sans, sans-serif`;

      // Title
      const title = document.getElementById('el-title');
      title.textContent = c.app_title;
      title.style.color = '#f0fdf4';
      title.style.fontFamily = `${c.font_family}, Playfair Display, serif`;
      title.style.fontSize = `${c.font_size * 3}px`;

      // Tagline
      const tagline = document.getElementById('el-tagline');
      tagline.textContent = c.tagline;
      tagline.style.color = c.secondary_action;
      tagline.style.fontSize = `${c.font_size * 1.125}px`;

      // Version
      const version = document.getElementById('el-version');
      version.textContent = c.version_text;
      version.style.backgroundColor = hexToRGBA(c.primary_action, 0.12);
      version.style.color = lighten(c.primary_action);

      // Button
      const btnText = document.getElementById('btn-text');
      btnText.textContent = c.button_text;
      const btn = document.getElementById('el-download-btn');
      btn.style.background = `linear-gradient(90deg, ${c.primary_action}, ${darken(c.primary_action)}, ${c.primary_action})`;
      btn.style.fontSize = `${c.font_size * 1.125}px`;

      // Features
      document.getElementById('feat-1-text').textContent = c.feature_1;
      document.getElementById('feat-2-text').textContent = c.feature_2;
      document.getElementById('feat-3-text').textContent = c.feature_3;

      const feats = [document.getElementById('feat-1'), document.getElementById('feat-2'), document.getElementById('feat-3')];
      feats.forEach(f => {
        f.style.backgroundColor = c.surface_color;
        const span = f.querySelector('span');
        if (span) {
          span.style.color = c.text_color;
          span.style.fontSize = `${c.font_size * 0.875}px`;
        }
      });

      // Accent icons
      document.querySelectorAll('.download-ring').forEach(r => {
        r.style.borderColor = c.primary_action;
      });
    }

    function hexToRGBA(hex, alpha) {
      try {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${alpha})`;
      } catch(e) { return hex; }
    }

    function lighten(hex) {
      try {
        let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        r = Math.min(255, r + 60); g = Math.min(255, g + 60); b = Math.min(255, b + 60);
        return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
      } catch(e) { return hex; }
    }

    function darken(hex) {
      try {
        let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        r = Math.max(0, r - 30); g = Math.max(0, g - 30); b = Math.max(0, b - 30);
        return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
      } catch(e) { return hex; }
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => { applyConfig(config); },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
          { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['app_title', config.app_title || defaultConfig.app_title],
        ['tagline', config.tagline || defaultConfig.tagline],
        ['version_text', config.version_text || defaultConfig.version_text],
        ['button_text', config.button_text || defaultConfig.button_text],
        ['feature_1', config.feature_1 || defaultConfig.feature_1],
        ['feature_2', config.feature_2 || defaultConfig.feature_2],
        ['feature_3', config.feature_3 || defaultConfig.feature_3]
      ])
    });

    lucide.createIcons();
  </script>
